<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Desi Surfer Ultimate</title>

<style>
body{margin:0;overflow:hidden;background:black;font-family:sans-serif}

/* GAME */
#game{
position:relative;
width:400px;height:600px;
margin:auto;
overflow:hidden;
border-radius:20px;
background:url('https://i.imgur.com/3ZQ3Z6D.png') repeat-y;
animation:bg 2s linear infinite;
}

@keyframes bg{
from{background-position:0 0}
to{background-position:0 600px}
}

/* FAKE 3D ROAD */
.road{
position:absolute;
width:100%;height:200%;
background:repeating-linear-gradient(
to bottom,
#444 0px,#444 40px,
#222 40px,#222 80px
);
animation:roadMove 0.3s linear infinite;
z-index:1;
}

@keyframes roadMove{
from{transform:translateY(0)}
to{transform:translateY(80px)}
}

/* PLAYER */
#player{
position:absolute;
width:50px;height:70px;
background:url('https://i.imgur.com/6X12R7K.png') no-repeat center/cover;
bottom:50px;left:180px;
animation:run 0.3s infinite;
z-index:3;
box-shadow:0 10px 20px rgba(0,0,0,0.7);
}

@keyframes run{
0%{transform:translateY(0)}
50%{transform:translateY(-5px)}
100%{transform:translateY(0)}
}

/* POLICE */
#police{
position:absolute;
width:50px;height:70px;
background:url('https://i.imgur.com/Z8KpQ9D.png') no-repeat center/cover;
bottom:-80px;left:180px;
opacity:0.8;
z-index:2;
}

/* OBJECTS */
.obstacle{
position:absolute;width:60px;height:90px;
background:red;border-radius:10px;
z-index:2;
}

.coin{
position:absolute;width:30px;height:30px;
background:gold;border-radius:50%;
box-shadow:0 0 15px gold;
z-index:2;
}

.power{
position:absolute;width:30px;height:30px;
background:cyan;border-radius:50%;
z-index:2;
}

/* UI */
#ui{
position:absolute;top:10px;left:10px;
color:white;font-size:18px;z-index:5;
}

/* GAME OVER */
#game-over{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
background:black;color:white;padding:20px;
display:none;text-align:center;
z-index:10;
}
</style>
</head>

<body>

<div id="game">
<div class="road"></div>

<div id="ui">Score: 0 | Coins: 0</div>

<div id="player"></div>
<div id="police"></div>

<div id="game-over">
<h2>GAME OVER</h2>
<p id="final"></p>
<button onclick="location.reload()">Restart</button>
</div>
</div>

<script>
let player=document.getElementById("player");
let police=document.getElementById("police");
let game=document.getElementById("game");

let lanes=[75,180,285];
let lane=1;

let score=0,coins=0,speed=6;
let isGameOver=false,isJump=false;
let shield=false,magnet=false;
let policeDist=120;

/* CONTROLS */
document.addEventListener("keydown",e=>{
if(isGameOver)return;

if(e.key==="ArrowLeft"&&lane>0)lane--;
if(e.key==="ArrowRight"&&lane<2)lane++;

if(e.key==="ArrowUp"&&!isJump){
isJump=true;
player.style.bottom="150px";
setTimeout(()=>{player.style.bottom="50px";isJump=false},400);
}

player.style.left=lanes[lane]+"px";
});

/* OBSTACLE */
function obstacle(){
if(isGameOver)return;

let o=document.createElement("div");
o.className="obstacle";
o.style.left=lanes[Math.floor(Math.random()*3)]+"px";
o.style.top="-100px";
game.appendChild(o);

let scale=0.5;

let move=setInterval(()=>{
let t=parseInt(o.style.top);

if(t>600){
o.remove();clearInterval(move);score+=10;
}else{
t+=speed;
scale+=0.01;
o.style.top=t+"px";
o.style.transform="scale("+scale+")";
}

/* collision */
let p=player.getBoundingClientRect();
let r=o.getBoundingClientRect();

if(p.left<r.left+r.width && p.left+p.width>r.left &&
p.top<r.top+r.height && p.top+p.height>r.top){

/* camera shake */
game.style.transform="translateX(5px)";
setTimeout(()=>game.style.transform="translateX(-5px)",50);
setTimeout(()=>game.style.transform="translateX(0)",100);

if(shield){o.remove();shield=false}
else{policeDist-=20;o.remove()}
}

policeFollow();

},20);

setTimeout(obstacle,1000);
}

/* COINS */
function coin(){
if(isGameOver)return;

let c=document.createElement("div");
c.className="coin";
c.style.left=lanes[Math.floor(Math.random()*3)]+"px";
c.style.top="-50px";
game.appendChild(c);

let move=setInterval(()=>{
let t=parseInt(c.style.top);

if(t>600){c.remove();clearInterval(move)}
else{
if(magnet){
let dx=player.offsetLeft-c.offsetLeft;
c.style.left=(c.offsetLeft+dx*0.1)+"px";
}
c.style.top=(t+speed)+"px";
}

let p=player.getBoundingClientRect();
let r=c.getBoundingClientRect();

if(p.left<r.left+r.width && p.left+p.width>r.left &&
p.top<r.top+r.height && p.top+p.height>r.top){
coins++;policeDist+=5;
c.remove();clearInterval(move);
}

},20);

setTimeout(coin,1500);
}

/* POWERUPS */
function power(){
if(isGameOver)return;

let p=document.createElement("div");
p.className="power";
p.style.left=lanes[Math.floor(Math.random()*3)]+"px";
p.style.top="-50px";
game.appendChild(p);

let move=setInterval(()=>{
let t=parseInt(p.style.top);

if(t>600){p.remove();clearInterval(move)}
else{p.style.top=(t+speed)+"px"}

let pl=player.getBoundingClientRect();
let pr=p.getBoundingClientRect();

if(pl.left<pr.left+pr.width && pl.left+pl.width>pr.left &&
pl.top<pr.top+pr.height && pl.top+pl.height>pr.top){

let type=Math.floor(Math.random()*2);

/* SHIELD */
if(type===0){
shield=true;
player.style.boxShadow="0 0 20px cyan";
setTimeout(()=>{shield=false;player.style.boxShadow="0 10px 20px rgba(0,0,0,0.7)"},5000);
}

/* MAGNET */
if(type===1){
magnet=true;
setTimeout(()=>magnet=false,5000);
}

p.remove();clearInterval(move);
}

},20);

setTimeout(power,5000);
}

/* POLICE */
function policeFollow(){
police.style.left=player.style.left;
policeDist-=0.04;
police.style.bottom=(50-policeDist)+"px";

if(policeDist<=0)gameOver();
}

/* GAME OVER */
function gameOver(){
isGameOver=true;
document.getElementById("game-over").style.display="block";
document.getElementById("final").innerText=
"Score: "+score+" | Coins: "+coins;
}

/* UI */
setInterval(()=>{
document.getElementById("ui").innerText=
"Score: "+score+" | Coins: "+coins;
},200);

/* START */
obstacle();
coin();
power();
</script>

</body>
</html>
